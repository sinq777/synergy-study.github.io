<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Слайдер изображений</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <h1 class="page-title">Слайдер изображений</h1>

    <div class="slider">
      <div class="slider__viewport">
        <img
          class="slider__image"
          id="sliderImage"
          src="./image/1.jpg"
          alt="Изображение 1"
        >
      </div>

      <div class="slider__controls">
        <button class="slider__btn slider__btn--prev" id="prevBtn" type="button" aria-label="Предыдущее изображение">
          &#8592; Назад
        </button>

        <p class="slider__counter" id="counter">Изображение 1 из 5</p>

        <button class="slider__btn slider__btn--next" id="nextBtn" type="button" aria-label="Следующее изображение">
          Вперёд &#8594;
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
